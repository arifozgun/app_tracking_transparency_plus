name: app_tracking_transparency_plus
description: This Flutter plugin allows you to display ios tracking authorization dialogue and request permission to collect data.
version: 2.1.0
homepage: https://github.com/arifozgun/app_tracking_transparency_plus
repository: https://github.com/arifozgun/app_tracking_transparency_plus
issue_tracker: https://github.com/arifozgun/app_tracking_transparency_plus/issues

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: AppTrackingTransparencyPlugin
